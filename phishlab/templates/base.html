<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Phishlab Triage{% endblock %}</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 1100px;
            margin: 2rem auto;
            padding: 0 1rem;
            color: #222;
            background: #fafafa;
        }
        h1, h2 { color: #1a1a1a; }
        a { color: #2563eb; text-decoration: none; }
        a:hover { text-decoration: underline; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; background: white; }
        th, td { padding: 0.6rem 0.8rem; text-align: left; border-bottom: 1px solid #e5e7eb; }
        th { background: #f3f4f6; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; }
        tr:hover { background: #f9fafb; }
        .badge { padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.8rem; font-weight: 600; }
        .badge-phish { background: #fee2e2; color: #991b1b; }
        .badge-safe { background: #d1fae5; color: #065f46; }
        .stats-row { margin-bottom: 1.5rem; }
        .stats-label { font-size: 0.75rem; color: #6b7280; text-transform: uppercase; font-weight: 600; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
        .stats { display: flex; gap: 1rem; flex-wrap: wrap; }
        .stat { background: white; padding: 1rem; border-radius: 6px; border: 1px solid #e5e7eb; flex: 1; min-width: 150px; }
        .stat-label { font-size: 0.85rem; color: #6b7280; text-transform: uppercase; }
        .stat-value { font-size: 2rem; font-weight: 700; margin-top: 0.3rem; }
        .muted { color: #6b7280; font-size: 0.9rem; }
        pre { background: white; padding: 1rem; border-radius: 6px; border: 1px solid #e5e7eb; overflow-x: auto; white-space: pre-wrap; }
        .meta { background: white; padding: 1rem; border-radius: 6px; border: 1px solid #e5e7eb; margin-bottom: 1rem; }
        .meta-row { display: flex; margin-bottom: 0.4rem; }
        .meta-label { font-weight: 600; width: 120px; color: #4b5563; }
        .ioc-container { background: white; padding: 1rem; border-radius: 6px; border: 1px solid #e5e7eb; margin-bottom: 1rem; }
        .ioc-group { margin-bottom: 1.2rem; }
        .ioc-group:last-child { margin-bottom: 0; }
        .ioc-group h4 { margin: 0 0 0.5rem 0; color: #374151; font-size: 0.95rem; }
        .ioc-count { background: #e5e7eb; color: #374151; padding: 0.1rem 0.5rem; border-radius: 10px; font-size: 0.75rem; font-weight: 600; margin-left: 0.3rem; }
        .ioc-list { list-style: none; padding: 0; margin: 0; }
        .ioc-list li { padding: 0.3rem 0; border-bottom: 1px solid #f3f4f6; }
        .ioc-list li:last-child { border-bottom: none; }
        .ioc-list code { background: #f9fafb; padding: 0.2rem 0.4rem; border-radius: 3px; font-family: "SF Mono", Monaco, Consolas, monospace; font-size: 0.85rem; color: #1f2937; word-break: break-all; }
        .review-container { background: white; padding: 1rem; border-radius: 6px; border: 1px solid #e5e7eb; margin-bottom: 1rem; }
        .review-status { margin-bottom: 1rem; display: flex; align-items: center; gap: 0.75rem; }
        .review-form { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .btn { padding: 0.5rem 1rem; border: none; border-radius: 4px; font-size: 0.9rem; font-weight: 600; cursor: pointer; font-family: inherit; }
        .btn-phish { background: #fee2e2; color: #991b1b; }
        .btn-phish:hover { background: #fecaca; }
        .btn-safe { background: #d1fae5; color: #065f46; }
        .btn-safe:hover { background: #a7f3d0; }
        .btn-reset { background: #f3f4f6; color: #374151; }
        .btn-reset:hover { background: #e5e7eb; }
    </style>
</head>
<body>
    <h1>Phishlab Triage</h1>
    <p class="muted">Phishing email triage dashboard</p>
    {% block content %}{% endblock %}
</body>
</html>
